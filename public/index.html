<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cesium Universal Manipulator Demo</title>
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" />
    <style>
      html,
      body,
      #cesiumContainer {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .control-panel {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        font-family: sans-serif;
        z-index: 100;
      }
      .control-panel label {
        display: block;
        margin-bottom: 6px;
      }
      .control-panel select,
      .control-panel input {
        width: 140px;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <div class="control-panel">
      <label>
        Orientation
        <select id="orientation">
          <option value="global">Global</option>
          <option value="local">Local</option>
          <option value="view">View</option>
          <option value="enu">ENU</option>
          <option value="normal">Normal</option>
        </select>
      </label>
      <label>
        Pivot
        <select id="pivot">
          <option value="origin">Origin</option>
          <option value="median">Median</option>
          <option value="cursor">Cursor</option>
          <option value="individual">Individual</option>
        </select>
      </label>
      <label>
        Snap (meters)
        <input id="snap" type="number" value="1" step="0.1" />
      </label>
    </div>
    <script type="module">
      import { UniversalManipulator } from '../dist/index.js';

      window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/';
      const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        requestRenderMode: true,
        shadows: true
      });

      const box = viewer.entities.add({
        name: 'Draggable box',
        position: Cesium.Cartesian3.fromDegrees(-75.59777, 40.03883, 100),
        box: {
          dimensions: new Cesium.Cartesian3(50, 50, 50),
          material: Cesium.Color.BLUE.withAlpha(0.5)
        }
      });

      viewer.zoomTo(box);

      const manipulator = new UniversalManipulator(viewer, {
        target: [
          {
            id: 'box',
            matrix: Cesium.Matrix4.clone(box.computeModelMatrix(Cesium.JulianDate.now(), new Cesium.Matrix4()))
          }
        ],
        orientation: 'global',
        pivot: 'origin',
        snap: { enabled: true, translate: 1, rotate: Cesium.Math.toRadians(5), scale: 0.1 }
      });

      viewer.scene.postRender.addEventListener(() => {
        const matrix = box.computeModelMatrix(Cesium.JulianDate.now(), new Cesium.Matrix4());
        manipulator.setTarget([
          {
            id: 'box',
            matrix: Cesium.Matrix4.clone(matrix)
          }
        ]);
      });

      document.getElementById('orientation').addEventListener('change', (event) => {
        manipulator.setOrientation(event.target.value);
      });
      document.getElementById('pivot').addEventListener('change', (event) => {
        manipulator.setPivot(event.target.value);
      });
      document.getElementById('snap').addEventListener('input', (event) => {
        const value = Number(event.target.value);
        manipulator.setSnap({ enabled: true, translate: value, rotate: Cesium.Math.toRadians(5), scale: 0.1 });
      });
    </script>
  </body>
</html>
