<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cesium Universal Manipulator Demo</title>
    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      .toolbar {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        padding: 10px;
        border-radius: 6px;
        font-family: sans-serif;
        z-index: 1;
      }
      .toolbar label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .toolbar select,
      .toolbar input[type='checkbox'] {
        margin-left: 4px;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <div class="toolbar">
      <label>
        Orientation
        <select id="orientation">
          <option value="global">Global</option>
          <option value="local">Local</option>
          <option value="view">View</option>
          <option value="enu" selected>ENU</option>
          <option value="normal">Normal</option>
          <option value="gimbal">Gimbal</option>
        </select>
      </label>
      <label>
        Pivot
        <select id="pivot">
          <option value="origin" selected>Origin</option>
          <option value="median">Median</option>
          <option value="cursor">Cursor</option>
          <option value="individual">Individual</option>
        </select>
      </label>
      <label>
        <input type="checkbox" id="enable-translate" checked /> Translate
      </label>
      <label>
        <input type="checkbox" id="enable-rotate" checked /> Rotate
      </label>
      <label>
        <input type="checkbox" id="enable-scale" checked /> Scale
      </label>
    </div>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <script type="module" src="../dist/src/example/main.js"></script>
  </body>
</html>
